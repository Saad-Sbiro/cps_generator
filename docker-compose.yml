version: '3.8'

services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: cps_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
      - /var/www/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: cps_generator
      DB_USERNAME: cps_user
      DB_PASSWORD: cps_password
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - cps_network

#  nginx:
#    image: nginx:1.25-alpine
#    container_name: cps_nginx
#    restart: unless-stopped
#    ports:
#      - "8000:80"
#    volumes:
#      - ./backend:/var/www
#      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
#    depends_on:
#      - app
#    networks:
#      - cps_network

  postgres:
    image: postgres:15-alpine
    container_name: cps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cps_generator
      POSTGRES_USER: cps_user
      POSTGRES_PASSWORD: cps_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cps_user -d cps_generator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cps_network



