services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    container_name: cps_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - /var/www/vendor
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: pgsql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: cps_generator
      DB_USERNAME: cps_user
      DB_PASSWORD: cps_password
      AUTO_MIGRATE: "true"
      AUTO_SEED: "false"
      EXPORTS_DISK: s3
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: us-east-1
      AWS_BUCKET: cps-exports
      AWS_ENDPOINT: http://minio:9000
      AWS_USE_PATH_STYLE_ENDPOINT: "true"
    depends_on:
      postgres:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/status || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - cps_network

  postgres:
    image: postgres:15-alpine
    container_name: cps_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cps_generator
      POSTGRES_USER: cps_user
      POSTGRES_PASSWORD: cps_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cps_user -d cps_generator"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - cps_network

  minio:
    image: minio/minio:latest
    container_name: cps_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - cps_network

  minio-init:
    image: minio/mc:latest
    container_name: cps_minio_init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set local http://minio:9000 minioadmin minioadmin; do
        echo 'Waiting for MinIO...';
        sleep 2;
      done;
      mc mb --ignore-existing local/cps-exports;
      mc anonymous set private local/cps-exports;
      "
    networks:
      - cps_network

networks:
  cps_network:
    driver: bridge

volumes:
  postgres_data:
  minio_data:
